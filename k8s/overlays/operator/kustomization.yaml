apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Install the OCIDex operator via its canonical kustomize base in config/operator/.
#
# Kustomize's security model prevents this overlay from referencing files
# outside its own directory tree. Install with:
#
#   kubectl kustomize config/operator/ | kubectl apply -f -
#
# Or to use this overlay with a namespace/image override:
#
#   kubectl kustomize --load-restrictor=LoadRestrictionsNone k8s/overlays/operator/ | kubectl apply -f -
#
resources:
  - ../../../config/operator
