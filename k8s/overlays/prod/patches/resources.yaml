---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-api
spec:
  template:
    spec:
      containers:
        - name: ocidex-api
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-scanner-worker
spec:
  template:
    spec:
      containers:
        - name: scanner-worker
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-enrichment-worker
spec:
  template:
    spec:
      containers:
        - name: enrichment-worker
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-web
spec:
  template:
    spec:
      containers:
        - name: ocidex-web
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
spec:
  template:
    spec:
      containers:
        - name: nats
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
