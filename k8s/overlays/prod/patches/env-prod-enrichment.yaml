apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-enrichment-worker
spec:
  template:
    spec:
      containers:
        - name: enrichment-worker
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
