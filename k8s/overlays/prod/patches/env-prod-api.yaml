apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-api
spec:
  template:
    spec:
      containers:
        - name: ocidex-api
          imagePullPolicy: Always
          env:
            - name: GITHUB_REDIRECT_URL
              value: "https://ocidex.app/auth/callback"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: FRONTEND_URL
              value: "https://ocidex.app"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://ocidex.app"
            - name: API_BASE_URL
              value: "https://ocidex.app"
            - name: SCANNER_ENABLED
              value: "true"
            - name: REGISTRY_POLLER_ENABLED
              value: "true"
