apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-scanner-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocidex-scanner-worker
  template:
    metadata:
      labels:
        app: ocidex-scanner-worker
    spec:
      # Must exceed scanner AckWait (10 minutes).
      terminationGracePeriodSeconds: 660
      containers:
        - name: scanner-worker
          image: ocidex-scanner-worker:latest
          ports:
            - name: health
              containerPort: 9090
          envFrom:
            - secretRef:
                name: ocidex-secrets
          env:
            - name: NATS_STREAM_REPLICAS
              value: "1"
            - name: DATABASE_MAX_CONNECTIONS
              value: "3"
            - name: NATS_URL
              value: "nats://nats:4222"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
