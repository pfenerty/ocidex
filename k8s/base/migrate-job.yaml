apiVersion: batch/v1
kind: Job
metadata:
  name: ocidex-migrate
  annotations:
    # Completed Jobs are immutable; this annotation tells Flux to delete and
    # recreate the Job whenever its spec changes (e.g. new image tag on a
    # release). Without it, Flux reconciliation fails on the second deploy.
    kustomize.toolkit.fluxcd.io/force: "enabled"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: goose
          image: ocidex-migrate:latest
          imagePullPolicy: Always
          args: ["$(DATABASE_URL)", "up"]
          envFrom:
            - secretRef:
                name: ocidex-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
