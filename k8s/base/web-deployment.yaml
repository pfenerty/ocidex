apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocidex-web
  template:
    metadata:
      labels:
        app: ocidex-web
    spec:
      containers:
        - name: ocidex-web
          image: ocidex-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
