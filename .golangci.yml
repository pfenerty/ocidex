version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - durationcheck
    - errname
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - tparallel
    - unconvert
    - unparam
    - usetesting
    - whitespace
  settings:
    goconst:
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    govet:
      disable:
        - shadow
    revive:
      rules:
        - name: exported
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocyclo
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
