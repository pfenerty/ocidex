apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-go-fmt
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.26
      name: fmt
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def main [] {
        log "Checking gofmt"
        let unformatted = (^gofmt -l . | complete | get stdout | str trim)
        if ($unformatted | str length) > 0 {
          print "Unformatted files:"; print $unformatted
          error make {msg: "gofmt: formatting issues found"}
        }
        log "OK: all files formatted"
        }
        let __tek_rc = (try { main; 0 } catch { |e| print $"error: ($e.msg)"; 1 })
        let __tek_prev = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 0 })
        let __tek_worst = ([$__tek_prev $__tek_rc] | math max)
        $"($__tek_worst)" | save -f /tekton/home/.exit-code
        exit $__tek_rc
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [go-fmt]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "go-fmt", description: $desc }

        log $"report-status [go-fmt]: POST ($url)"
        log $"report-status [go-fmt]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [go-fmt]: done"
        } catch { |e|
          log $"report-status [go-fmt]: error: ($e.msg)"
        }
        exit $exit_code
  workspaces:
    - name: workspace
