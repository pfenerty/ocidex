apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-set-status-pending-ocidex-tag
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  steps:
    - computeResources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 25m
          memory: 64Mi
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: pending-image-release-api
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: "pending", context: "image-release-api", description: "Running" }

        log $"status-pending [image-release-api]: POST ($url)"
        log $"status-pending [image-release-api]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "status-pending [image-release-api]: done"
        } catch { |e|
          log $"status-pending [image-release-api]: error: ($e.msg)"
          exit 1
        }
    - computeResources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 25m
          memory: 64Mi
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
