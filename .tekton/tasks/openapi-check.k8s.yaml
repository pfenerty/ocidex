apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-openapi-check
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    env:
      - name: GOMODCACHE
        value: $(workspaces.workspace.path)/.go-mod
      - name: GOCACHE
        value: $(workspaces.workspace.path)/.go-build
      - name: GIT_CONFIG_GLOBAL
        value: $(workspaces.workspace.path)/.gitconfig
      - name: HOME
        value: /tmp
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.26
      name: check-spec
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def main [] {
        log $"pwd=(pwd) uid=(id -u) go=(go version)"
        log $".git exists=('.git' | path exists)"
        ^git config --global --add safe.directory (pwd)
        log "Generating OpenAPI spec"
        ^go run ./cmd/specgen out> /tmp/openapi-check.json
        log "Diffing against committed spec"
        ^diff web/openapi.json /tmp/openapi-check.json
        log "OK: spec is up to date"
        }
        let __tek_rc = (try { main; 0 } catch { |e| print $"error: ($e.msg)"; 1 })
        let __tek_prev = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 0 })
        let __tek_worst = ([$__tek_prev $__tek_rc] | math max)
        $"($__tek_worst)" | save -f /tekton/home/.exit-code
        exit $__tek_rc
    - computeResources:
        limits:
          cpu: "2"
          memory: 3Gi
        requests:
          cpu: 100m
          memory: 2Gi
      image: ghcr.io/pfenerty/apko-cicd/nodejs:24
      name: check-types
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def main [] {
        log $"pwd=(pwd) uid=(id -u) node=(node --version) npm=(npm --version)"
        log $"node_modules exists=('node_modules' | path exists) package.json exists=('package.json' | path exists)"
        log "Installing dependencies"
        ^npm ci
        log $"node_modules exists after install=('node_modules' | path exists)"
        log "Generating TypeScript types from spec"
        ^npx openapi-typescript openapi.json -o /tmp/openapi-check.d.ts
        log "Diffing against committed types"
        ^diff src/types/openapi.d.ts /tmp/openapi-check.d.ts
        log "OK: types up to date"
        }
        let __tek_rc = (try { main; 0 } catch { |e| print $"error: ($e.msg)"; 1 })
        let __tek_prev = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 0 })
        let __tek_worst = ([$__tek_prev $__tek_rc] | math max)
        $"($__tek_worst)" | save -f /tekton/home/.exit-code
        exit $__tek_rc
      workingDir: $(workspaces.workspace.path)/web
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [openapi-check]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "openapi-check", description: $desc }

        log $"report-status [openapi-check]: POST ($url)"
        log $"report-status [openapi-check]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [openapi-check]: done"
        } catch { |e|
          log $"report-status [openapi-check]: error: ($e.msg)"
        }
        exit $exit_code
  workspaces:
    - name: workspace
