apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-git-clone
  namespace: ocidex-ci
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
  results:
    - description: Full commit SHA
      name: commit
      type: string
    - description: Abbreviated commit SHA
      name: short-sha
      type: string
    - description: Checked-out branch/revision
      name: branch
      type: string
    - description: Commit subject line
      name: commit-message
      type: string
    - description: Commit author name
      name: author-name
      type: string
    - description: Commit author email
      name: author-email
      type: string
    - description: Author timestamp (ISO 8601)
      name: timestamp
      type: string
    - description: Repository remote URL
      name: remote-url
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  steps:
    - env:
        - name: GIT_CONFIG_GLOBAL
          value: $(workspaces.workspace.path)/.gitconfig
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: clone
      script: |-
        #!/usr/bin/env nu
        # Mark workspace as safe before any git operations that check directory ownership.
        # The workspace dir may be owned by root (local-path provisioner) while the pod
        # runs as a non-root uid; git 2.35.2+ rejects such repos without this config.
        git config --global --add safe.directory $(workspaces.workspace.path)
        git init -b main .
        git remote add origin $(params.url)
        # Fetch only the target branch. GitHub doesn't allow fetching by arbitrary SHA,
        # but the revision is always a branch tip in CI (push/PR events). Fetching a
        # single branch avoids wildcard-refspec pack issues in newer git versions.
        git fetch --depth=1 origin $(params.revision)
        git checkout -b $(params.revision) FETCH_HEAD

        # Write git metadata as Tekton results for downstream tasks.
        let sha = (git rev-parse HEAD | str trim)
        let short_sha = (git rev-parse --short HEAD | str trim)
        let commit_message = (git log -1 --format=%s | str trim)
        let author_name = (git log -1 --format=%an | str trim)
        let author_email = (git log -1 --format=%ae | str trim)
        let timestamp = (git log -1 --format=%aI | str trim)

        $sha            | save -f $(results.commit.path)
        $short_sha      | save -f $(results.short-sha.path)
        "$(params.revision)"   | save -f $(results.branch.path)
        $commit_message | save -f $(results.commit-message.path)
        $author_name    | save -f $(results.author-name.path)
        $author_email   | save -f $(results.author-email.path)
        $timestamp      | save -f $(results.timestamp.path)
        "$(params.url)"        | save -f $(results.remote-url.path)
      workingDir: $(workspaces.workspace.path)
  workspaces:
    - name: workspace
