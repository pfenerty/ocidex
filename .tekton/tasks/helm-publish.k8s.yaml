apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-helm-publish
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - env:
        - name: DOCKER_CONFIG
          value: /tmp/helm-auth
      image: alpine/helm:3
      name: package-and-push
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        # Package and push the ocidex Helm charts.
        #
        # Authored as a standalone, shellcheck-able file and wired in via
        # tektonic's scriptFromFile(). tektonic injects the exit-code capture and
        # status reporting, so this just needs to exit non-zero on failure — `set -e`
        # aborts on the first failing helm command. `$(params.revision)` is substituted
        # by Tekton at run time.
        set -e

        SHORT_SHA=$(echo "$(params.revision)" | cut -c1-8)
        VERSION="0.1.0-${SHORT_SHA}"

        helm package charts/ocidex \
          --version "${VERSION}" \
          --app-version "sha-${SHORT_SHA}"

        helm package charts/ocidex-operator \
          --version "${VERSION}" \
          --app-version "sha-${SHORT_SHA}"

        helm push "ocidex-${VERSION}.tgz" oci://ghcr.io/pfenerty/charts
        helm push "ocidex-operator-${VERSION}.tgz" oci://ghcr.io/pfenerty/charts
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
      volumeMounts:
        - mountPath: /tmp/helm-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] report-status [helm-publish]: ($msg)"
        }

        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "helm-publish", description: $desc }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
        }
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
