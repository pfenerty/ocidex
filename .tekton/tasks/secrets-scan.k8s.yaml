apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-secrets-scan
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - computeResources:
        limits:
          cpu: "1"
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      image: zricethezav/gitleaks:latest
      name: gitleaks
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        # Report-only secrets scan in git mode (scans tracked commits, so build/dep caches
        # on the shared workspace are never scanned). Scope is situational via PAC context
        # injected as env (podTemplateEnv): a PR scans only the commits it adds vs its base
        # branch; a push to main scans the full history. Fails safe to a full scan if the
        # event/base is unknown or the base can't be fetched. gitleaks exits non-zero on a
        # leak, which the statusReporter surfaces as a failed check (pipeline stays green
        # via onError: continue).
        set -u
        CFG="--config .gitleaks.toml"
        COMMON="--redact --verbose --no-banner"
        EVENT="${PAC_EVENT_TYPE:-}"
        TARGET="${PAC_TARGET_BRANCH:-}"

        if [ "$EVENT" = "pull_request" ] && [ -n "$TARGET" ]; then
          BASE="$TARGET"
        else
          BASE=""
        fi

        if [ -n "$BASE" ]; then
          git -c safe.directory='*' fetch --quiet origin "$BASE" || BASE=""
        fi

        if [ -n "$BASE" ]; then
          # Only the commits this branch adds on top of the base.
          gitleaks git . $CFG $COMMON --log-opts="FETCH_HEAD..HEAD"
        else
          # Full history.
          gitleaks git . $CFG $COMMON
        fi
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [secrets-scan]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "secrets-scan", description: $desc }

        log $"report-status [secrets-scan]: POST ($url)"
        log $"report-status [secrets-scan]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [secrets-scan]: done"
        } catch { |e|
          log $"report-status [secrets-scan]: error: ($e.msg)"
        }
        exit $exit_code
  workspaces:
    - name: workspace
