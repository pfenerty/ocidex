apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-secrets-scan
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - computeResources:
        limits:
          cpu: "1"
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      image: zricethezav/gitleaks:latest
      name: gitleaks
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        # Report-only secrets scan of the working tree. `--no-git` scans files directly so
        # it works regardless of clone depth; gitleaks exits non-zero when a leak is found,
        # which the statusReporter surfaces as a failed check (pipeline stays green via
        # onError: continue).
        gitleaks detect --source . --no-git --redact --verbose
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [secrets-scan]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "secrets-scan", description: $desc }

        log $"report-status [secrets-scan]: POST ($url)"
        log $"report-status [secrets-scan]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [secrets-scan]: done"
        } catch { |e|
          log $"report-status [secrets-scan]: error: ($e.msg)"
        }
        exit $exit_code
  workspaces:
    - name: workspace
