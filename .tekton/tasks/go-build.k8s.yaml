apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-go-build
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    env:
      - name: GOMODCACHE
        value: $(workspaces.workspace.path)/.go-mod
      - name: GOCACHE
        value: $(workspaces.workspace.path)/.go-build
      - name: GIT_CONFIG_GLOBAL
        value: $(workspaces.workspace.path)/.gitconfig
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: restore-go-cache-cache
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] restore-go-cache-cache: ($msg)"
        }

        let hash = (
          ["go.sum"]
          | each { |f| if ($f | path exists) { open --raw $f } else { "" } }
          | str join | hash sha256 | str substring 0..15
        )
        $hash | save -f /tekton/home/.cache-go-cache-hash
        let archive = $"$(workspaces.go-cache.path)/($hash).tar.zst"

        if ($archive | path exists) {
          let archive_size = (ls $archive | get size.0)
          log $"hit ($hash) size=($archive_size)"
          let cache_paths = [".go-mod", ".go-build"]
          for p in $cache_paths {
            if ($p | path exists) { ^chmod -R u+w $p; rm -rf $p }
          }
          let t0 = (date now)
          ^zstd -d -T1 -c $archive | ^tar xf - -o --no-same-permissions
          let elapsed = (((date now) - $t0) | into int) / 1_000_000_000
          log $"restored in ($elapsed)s"
        } else {
          log $"miss ($hash)"
        }
      workingDir: $(workspaces.workspace.path)
    - computeResources:
        limits:
          cpu: "2"
          ephemeral-storage: 4Gi
          memory: 2Gi
        requests:
          cpu: 500m
          ephemeral-storage: 2Gi
          memory: 1Gi
      image: ghcr.io/pfenerty/apko-cicd/golang:1.26
      name: build
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def run_and_save [prev_ec: int, ...args: string] {
            try { run-external ...$args } catch { null }
            let ec = $env.LAST_EXIT_CODE
            let worst = if $prev_ec != 0 { $prev_ec } else { $ec }
            $"($worst)" | save -f /tekton/home/.exit-code
            $worst
        }

        log $"pwd=(pwd) uid=(id -u) go=(go version)"
        log $"GOMODCACHE=($env.GOMODCACHE) GOCACHE=($env.GOCACHE)"
        log $".git exists=('.git' | path exists) go-mod exists=('go-mod' | path exists)"
        ^git config --global --add safe.directory (pwd)
        log $"git rev-parse HEAD: (^git rev-parse --short HEAD)"
        log "Building ocidex binaries"
        mut ec = 0
        for cmd in ["./cmd/ocidex", "./cmd/scanner-worker", "./cmd/enrichment-worker"] {
            log $"Building ($cmd)"
            $ec = (run_and_save $ec "go" "build" "-o" "/dev/null" $cmd)
            log $"  -> exit ($ec)"
        }
        log $"Exit code: ($ec)"
        exit $ec
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: save-go-cache-cache
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] save-go-cache-cache: ($msg)"
        }

        let hash = (try { open --raw /tekton/home/.cache-go-cache-hash | str trim } catch { "" })
        if ($hash | is-empty) { log "no hash, skipping"; exit 0 }

        let archive = $"$(workspaces.go-cache.path)/($hash).tar.zst"
        if ($archive | path exists) { log $"($hash) exists, skipping"; exit 0 }

        let paths = [".go-mod", ".go-build"] | where { |p| ($p | path exists) }
        if ($paths | is-empty) { log "no paths to cache"; exit 0 }

        for p in $paths { ^chmod -R u+w $p }

        let max = 3
        if $max > 0 {
          let entries = (try { ls $(workspaces.go-cache.path)/*.tar.zst | sort-by modified | reverse | skip $max } catch { [] })
          for e in $entries { log $"evicting ($e.name | path basename)"; rm $e.name }
        }

        let uncompressed = ($paths | each { |p| try { du $p | get apparent.0 | into int } catch { 0 } } | math sum)
        log $"compressing (($uncompressed / 1_000_000) | math round --precision 1)MB uncompressed ..."
        let t0 = (date now)
        ^tar cf - ...$paths | ^zstd -1 -T1 -o $archive
        let elapsed = (((date now) - $t0) | into int) / 1_000_000_000
        let compressed = (ls $archive | get size.0)
        let ratio = ($uncompressed / ($compressed | into int) | math round --precision 1)
        log $"saved ($compressed) ratio=($ratio)x in ($elapsed)s"
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] report-status [go-build]: ($msg)"
        }

        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "go-build", description: $desc }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
        }
  workspaces:
    - name: go-cache
    - name: workspace
