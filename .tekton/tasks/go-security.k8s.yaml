apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-go-security
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - computeResources:
        limits:
          cpu: "1"
          memory: 512Mi
        requests:
          cpu: 200m
          memory: 256Mi
      image: ghcr.io/pfenerty/apko-cicd/syft:1.45.1
      name: sbom
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        # Catalog the Go module graph straight from go.sum/go.mod — no toolchain, no
        # network needed (unlike the old `go run govulncheck@latest`).
        set -eu

        echo "── syft: generating SBOM (Go dependency graph) ────────────────"
        syft dir:. --select-catalogers go -o json --file sbom.json
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
    - computeResources:
        limits:
          cpu: "1"
          memory: 512Mi
        requests:
          cpu: 200m
          memory: 256Mi
      image: ghcr.io/pfenerty/apko-cicd/grype:0.114.0
      name: scan
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        # grype exits non-zero on any low+ severity match against the SBOM the sbom step
        # produced — reported as this task's GitHub check (see spec.ts comment).
        set -u

        echo "── grype: scanning SBOM for known vulnerabilities ──────────────"
        grype sbom:sbom.json --fail-on low
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [go-security]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "go-security", description: $desc }

        log $"report-status [go-security]: POST ($url)"
        log $"report-status [go-security]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [go-security]: done"
        } catch { |e|
          log $"report-status [go-security]: error: ($e.msg)"
        }
  workspaces:
    - name: workspace
