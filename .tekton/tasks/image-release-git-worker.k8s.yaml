apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-image-release-git-worker
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  results:
    - description: Fully-qualified reference of the git-worker image (Tekton Chains subject)
      name: git-worker-IMAGE_URL
      type: string
    - description: Digest (alg:hex) of the git-worker image (Tekton Chains subject)
      name: git-worker-IMAGE_DIGEST
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - computeResources:
        limits:
          cpu: "4"
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 1Gi
      env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
        - name: BUILDKITD_FLAGS
          value: --oci-worker-snapshotter=native --oci-worker-no-process-sandbox
        - name: CHAINS_IMAGE_URL_PATH
          value: $(results.git-worker-IMAGE_URL.path)
        - name: CHAINS_IMAGE_DIGEST_PATH
          value: $(results.git-worker-IMAGE_DIGEST.path)
        - name: IMAGE
          value: ghcr.io/pfenerty/ocidex-git-worker
        - name: DOCKERFILE
          value: docker/Dockerfile
        - name: IMAGE_TITLE
          value: OCIDex Git Worker
        - name: IMAGE_DESCRIPTION
          value: Git commit metadata enricher
        - name: TARGET
          value: git-worker
      image: moby/buildkit:rootless
      name: build-and-push
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        # Release build: tags images with semver aliases from the git tag name.
        # latest is only added for stable releases (no hyphen in tag).
        # Per-image values come from step env: DOCKERFILE, IMAGE, optional TARGET,
        # IMAGE_TITLE, IMAGE_DESCRIPTION.
        # buildctl's exit code is captured in $rc and re-exited after writing Chains hints.
        TAG="$(params.source-branch)"
        TAG="${TAG#refs/tags/}"
        BARE="${TAG#v}"
        MAJOR=$(echo "$BARE" | cut -d. -f1)
        MINOR=$(echo "$BARE" | cut -d. -f2)

        NAMES="$IMAGE:$TAG,$IMAGE:$MAJOR.$MINOR,$IMAGE:$MAJOR"
        if ! echo "$TAG" | grep -q '-'; then
          NAMES="$NAMES,$IMAGE:latest"
        fi
        CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        # OCI metadata is applied entirely via buildctl CLI (no Dockerfile LABELs):
        #   --opt label:KEY=VALUE      -> per-platform image config labels (docker inspect).
        #     label: is a dockerfile FRONTEND opt; as an image EXPORTER (--output) attribute
        #     buildkit silently ignores it, which is why labels were previously missing.
        #   annotation-index.KEY=VALUE -> OCI annotations on the image index (read by GHCR).
        A=org.opencontainers.image
        SRC=https://github.com/pfenerty/ocidex
        ANN="annotation-index.$A.version=$TAG"
        ANN="$ANN,annotation-index.$A.revision=$(params.revision)"
        ANN="$ANN,annotation-index.$A.created=$CREATED"
        ANN="$ANN,annotation-index.$A.source=$SRC"
        ANN="$ANN,annotation-index.$A.url=$SRC"
        ANN="$ANN,annotation-index.$A.licenses=MIT"
        ANN="$ANN,annotation-index.$A.authors=Patrick Fenerty"
        ANN="$ANN,annotation-index.$A.title=$IMAGE_TITLE"
        ANN="$ANN,annotation-index.$A.description=$IMAGE_DESCRIPTION"

        TARGET_OPT=""
        if [ -n "$TARGET" ]; then TARGET_OPT="--opt target=$TARGET"; fi

        buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --opt filename="$DOCKERFILE" \
          $TARGET_OPT \
          --opt platform=linux/amd64,linux/arm64 \
          --opt build-arg:VERSION="$TAG" \
          --opt build-arg:COMMIT="$(params.revision)" \
          --opt build-arg:DATE="$CREATED" \
          --opt "label:$A.version=$TAG" \
          --opt "label:$A.revision=$(params.revision)" \
          --opt "label:$A.created=$CREATED" \
          --opt "label:$A.source=$SRC" \
          --opt "label:$A.url=$SRC" \
          --opt "label:$A.licenses=MIT" \
          --opt "label:$A.authors=Patrick Fenerty" \
          --opt "label:$A.title=$IMAGE_TITLE" \
          --opt "label:$A.description=$IMAGE_DESCRIPTION" \
          --opt attest:provenance=mode=max \
          --opt attest:sbom= \
          --export-cache "type=registry,ref=$IMAGE:buildcache,mode=max,image-manifest=true,oci-mediatypes=true" \
          --import-cache "type=registry,ref=$IMAGE:buildcache" \
          --metadata-file /tmp/buildctl-metadata.json \
          --output "type=image,\"name=$NAMES\",push=true,attestation-manifest-referrers=true,$ANN"
        rc=$?

        # Tekton Chains build-subject hints: record the pushed image ref + digest so Chains
        # attests this run produced this image. Best-effort; never masks buildctl's exit.
        if [ "$rc" -eq 0 ] && [ -n "$CHAINS_IMAGE_URL_PATH" ]; then
          DIGEST=$(sed -n 's/.*"containerimage.digest": *"\([^"]*\)".*/\1/p' /tmp/buildctl-metadata.json | head -1)
          printf '%s' "$IMAGE" > "$CHAINS_IMAGE_URL_PATH"
          printf '%s' "$DIGEST" > "$CHAINS_IMAGE_DIGEST_PATH"
        fi
        exit "$rc"
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
      securityContext:
        allowPrivilegeEscalation: true
        capabilities:
          add:
            - SETUID
            - SETGID
          drop: []
        runAsGroup: 1000
        runAsUser: 1000
        seccompProfile:
          type: Unconfined
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [image-release-git-worker]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "image-release-git-worker", description: $desc }

        log $"report-status [image-release-git-worker]: POST ($url)"
        log $"report-status [image-release-git-worker]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [image-release-git-worker]: done"
        } catch { |e|
          log $"report-status [image-release-git-worker]: error: ($e.msg)"
        }
        exit $exit_code
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
