apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-image-build-web
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
      env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
      image: moby/buildkit:latest
      name: build-and-push
      onError: continue
      script: |
        #!/bin/sh
        SHORT_SHA=$(echo "$(params.revision)" | cut -c1-8)
        VERSION="main-${SHORT_SHA}"
        BKADDR=unix:///tmp/buildkitd.sock

        buildkitd \
          --addr "${BKADDR}" \
          --root /tmp/buildkitd \
          --oci-worker-no-process-sandbox \
          &
        BKPID=$!

        until buildctl --addr "${BKADDR}" debug workers > /dev/null 2>&1; do sleep 1; done

        buildctl --addr "${BKADDR}" build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --opt filename=docker/web/Dockerfile \
          --opt platform=linux/amd64,linux/arm64 \
          --opt build-arg:VERSION="${VERSION}" \
          --opt build-arg:COMMIT="$(params.revision)" \
          --opt build-arg:DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --opt attest:provenance=mode=max \
          --opt attest:sbom=generator=ghcr.io/anchore/syft:latest \
          --output "type=image,\"name=ghcr.io/pfenerty/ocidex-web:sha-${SHORT_SHA},ghcr.io/pfenerty/ocidex-web:main\",push=true,attestation-manifest-referrers=true"
        ec=$?

        kill ${BKPID} 2>/dev/null; wait ${BKPID} 2>/dev/null || true
        echo "${ec}" > /tekton/home/.exit-code
        exit "${ec}"
      securityContext:
        capabilities:
          add:
            - SYS_ADMIN
            - SETUID
            - SETGID
          drop: []
        runAsUser: 0
        seccompProfile:
          type: Unconfined
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
      workingDir: $(workspaces.workspace.path)
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] {
          print $"[(date now | format date '%H:%M:%S')] report-status [image-build-web]: ($msg)"
        }

        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "image-build-web", description: $desc }

        log $"POST ($url)"
        log $"body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "done"
        } catch { |e|
          log $"error: ($e.msg)"
        }
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
