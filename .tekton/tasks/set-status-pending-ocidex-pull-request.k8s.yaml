        } catch { |e|
          log $"status-pending [openapi-check]: error: ($e.msg)"
          exit 1
        }
    - computeResources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 25m
          memory: 64Mi
      env:
        - name: GITHUB_TOKEN
