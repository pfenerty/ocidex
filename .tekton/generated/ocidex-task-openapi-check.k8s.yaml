apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-openapi-check
  namespace: ocidex-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/golang:1.25
      name: check-spec
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        log "Generating OpenAPI spec"
        let gen = (^go run ./cmd/specgen out> /tmp/openapi-check.json | complete)
        if $gen.exit_code != 0 {
            print $gen.stderr
            $"($gen.exit_code)" | save -f /tekton/home/.exit-code
            log $"FAIL: specgen exit ($gen.exit_code)"
            exit $gen.exit_code
        }
        log "Diffing against committed spec"
        let diff = (^diff web/openapi.json /tmp/openapi-check.json | complete)
        print $diff.stdout
        $"($diff.exit_code)" | save -f /tekton/home/.exit-code
        log (if $diff.exit_code == 0 { "OK: spec is up to date" } else { "FAIL: spec out of date" })
        exit $diff.exit_code
    - image: ghcr.io/pfenerty/apko-cicd/nodejs:22
      name: check-types
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let prev_ec = (open /tekton/home/.exit-code | str trim | into int)
        log "Installing node dependencies"
        if not ("node_modules" | path exists) { ^npm ci --ignore-scripts }
        log "Generating TypeScript types from spec"
        let gen = (^npx openapi-typescript openapi.json -o /tmp/openapi-check.d.ts | complete)
        if $gen.exit_code != 0 {
            print $gen.stderr
            let ec = if $prev_ec != 0 { $prev_ec } else { $gen.exit_code }
            $"($ec)" | save -f /tekton/home/.exit-code
            exit $ec
        }
        log "Diffing against committed types"
        let diff = (^diff src/types/openapi.d.ts /tmp/openapi-check.d.ts | complete)
        print $diff.stdout
        let ec = if $prev_ec != 0 { $prev_ec } else { $diff.exit_code }
        $"($ec)" | save -f /tekton/home/.exit-code
        log (if $diff.exit_code == 0 { "OK: types up to date" } else { "FAIL: types out of date" })
        exit $ec
      workingDir: $(workspaces.workspace.path)/web
    - args:
        - |-
          EXIT_CODE=$(cat /tekton/home/.exit-code)
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success DESC=Passed; else STATE=failure DESC=Failed; fi
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -H "Content-Type: application/json"   -d "{\"state\":\"$STATE\",\"context\":\"ocidex/openapi\",\"description\":\"$DESC\"}"   "https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: report-status
  workspaces:
    - name: workspace
