apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ocidex-git-clone
  namespace: ocidex-ci
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  steps:
    - env:
        - name: GIT_CONFIG_GLOBAL
          value: $(workspaces.workspace.path)/.gitconfig
      image: cgr.dev/chainguard/git:latest
      name: clone
      script: |-
        #!/bin/sh
        set -e
        # Mark workspace as safe before any git operations that check directory ownership.
        # The workspace dir may be owned by root (local-path provisioner) while the pod
        # runs as a non-root uid; git 2.35.2+ rejects such repos without this config.
        git config --global --add safe.directory $(workspaces.workspace.path)
        git init .
        git remote add origin $(params.url)
        # Fetch all branch tips (depth=1) — GitHub doesn't allow fetching by arbitrary SHA.
        # The revision is always a branch tip in CI (push/PR events), so it will be present.
        git fetch --depth=1 origin '+refs/heads/*:refs/remotes/origin/*'
        git -c advice.detachedHead=false checkout $(params.revision)
      workingDir: $(workspaces.workspace.path)
  workspaces:
    - name: workspace
