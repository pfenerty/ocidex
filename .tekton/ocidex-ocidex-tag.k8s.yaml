apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[refs/tags/*]"
    pipelinesascode.tekton.dev/task: "[.tekton/tasks/set-status-pending-ocidex-push.k8s.yaml, .tekton/tasks/git-clone.k8s.yaml, .tekton/tasks/go-fmt.k8s.yaml, .tekton/tasks/go-test.k8s.yaml, .tekton/tasks/go-build.k8s.yaml, .tekton/tasks/openapi-check.k8s.yaml, .tekton/tasks/frontend-lint.k8s.yaml, .tekton/tasks/image-build-api.k8s.yaml, .tekton/tasks/image-build-scanner-worker.k8s.yaml, .tekton/tasks/image-build-enrichment-worker.k8s.yaml, .tekton/tasks/image-build-web.k8s.yaml, .tekton/tasks/image-build-operator.k8s.yaml, .tekton/tasks/helm-publish.k8s.yaml, .tekton/tasks/set-status-pending-ocidex-pull-request.k8s.yaml, .tekton/tasks/set-status-pending-ocidex-tag.k8s.yaml, .tekton/tasks/image-release-api.k8s.yaml, .tekton/tasks/image-release-scanner-worker.k8s.yaml, .tekton/tasks/image-release-enrichment-worker.k8s.yaml, .tekton/tasks/image-release-web.k8s.yaml, .tekton/tasks/image-release-operator.k8s.yaml, .tekton/tasks/helm-release.k8s.yaml, .tekton/tasks/gh-release.k8s.yaml]"
  name: ocidex-ocidex-tag
spec:
  params:
    - name: project-name
      value: "{{ repo_name }}"
    - name: repo-full-name
      value: "{{ repo_owner }}/{{ repo_name }}"
    - name: source-branch
      value: "{{ source_branch }}"
    - name: revision
      value: "{{ revision }}"
    - name: url
      value: "{{ repo_url }}"
  pipelineSpec:
    params:
      - name: project-name
        type: string
      - name: repo-full-name
        type: string
      - name: source-branch
        type: string
      - name: revision
        type: string
      - name: url
        type: string
    tasks:
      - name: set-status-pending-ocidex-tag
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - git-clone
        taskRef:
          kind: Task
          name: ocidex-set-status-pending-ocidex-tag
      - name: git-clone
        params:
          - name: url
            value: $(params.url)
          - name: revision
            value: $(params.revision)
        taskRef:
          kind: Task
          name: ocidex-git-clone
        workspaces:
          - name: workspace
            workspace: workspace
      - name: go-build
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-go-build
        workspaces:
          - name: go-cache
            workspace: go-cache
          - name: workspace
            workspace: workspace
      - name: go-test
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - go-build
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-go-test
        workspaces:
          - name: go-cache
            workspace: go-cache
          - name: workspace
            workspace: workspace
      - name: frontend-lint
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-frontend-lint
        workspaces:
          - name: node-cache
            workspace: node-cache
          - name: workspace
            workspace: workspace
      - name: openapi-check
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - go-build
          - frontend-lint
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-openapi-check
        workspaces:
          - name: workspace
            workspace: workspace
      - name: image-release-api
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - go-test
          - openapi-check
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-image-release-api
        workspaces:
          - name: workspace
            workspace: workspace
      - name: image-release-scanner-worker
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - go-test
          - openapi-check
          - image-release-api
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-image-release-scanner-worker
        workspaces:
          - name: workspace
            workspace: workspace
      - name: image-release-enrichment-worker
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - go-test
          - openapi-check
          - image-release-scanner-worker
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-image-release-enrichment-worker
        workspaces:
          - name: workspace
            workspace: workspace
      - name: image-release-web
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - go-test
          - openapi-check
          - image-release-enrichment-worker
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-image-release-web
        workspaces:
          - name: workspace
            workspace: workspace
      - name: image-release-operator
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - go-test
          - openapi-check
          - image-release-web
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-image-release-operator
        workspaces:
          - name: workspace
            workspace: workspace
      - name: helm-release
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - image-release-api
          - image-release-scanner-worker
          - image-release-enrichment-worker
          - image-release-web
          - image-release-operator
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-helm-release
        workspaces:
          - name: workspace
            workspace: workspace
      - name: gh-release
        params:
          - name: repo-full-name
            value: $(params.repo-full-name)
          - name: revision
            value: $(params.revision)
        runAfter:
          - image-release-api
          - image-release-scanner-worker
          - image-release-enrichment-worker
          - image-release-web
          - image-release-operator
          - set-status-pending-ocidex-tag
        taskRef:
          kind: Task
          name: ocidex-gh-release
        workspaces:
          - name: workspace
            workspace: workspace
    workspaces:
      - name: workspace
      - name: go-cache
      - name: node-cache
  taskRunTemplate:
    podTemplate:
      securityContext:
        fsGroup: 1024
        runAsGroup: 1024
        runAsNonRoot: true
        runAsUser: 1024
        seccompProfile:
          type: RuntimeDefault
    serviceAccountName: default
  timeouts:
    pipeline: 2h
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
          storageClassName: local-path
    - name: go-cache
      persistentVolumeClaim:
        claimName: ocidex-go-cache
    - name: node-cache
      persistentVolumeClaim:
        claimName: ocidex-node-cache
