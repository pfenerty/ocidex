name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      docker-api: ${{ steps.filter.outputs.docker-api }}
      docker-web: ${{ steps.filter.outputs.docker-web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'db/**'
            web:
              - 'web/**'
            docker-api:
              - 'docker/api/**'
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            docker-web:
              - 'docker/web/**'
              - 'web/**'

  go-format:
    name: Go / Format
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

  go-lint:
    name: Go / Lint
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  go-test:
    name: Go / Test
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Test
        run: go test -v -race -short -coverprofile=coverage.out -covermode=atomic ./...
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unit

  go-build:
    name: Go / Build
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build
        run: make build

  integration:
    name: Go / Integration tests
    needs: [changes, go-test]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Integration tests
        run: go test -v -race ./tests/...

  openapi-check:
    name: Go / OpenAPI check
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend deps
        run: cd web && npm ci
      - name: Check OpenAPI spec is up to date
        run: make openapi-check

  frontend-lint:
    name: Frontend / Lint
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: cd web && npm ci
      - name: Lint
        run: make frontend-lint

  frontend-build:
    name: Frontend / Build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: cd web && npm ci
      - name: Build
        run: cd web && npm run build

  docker-api:
    name: Docker / API image
    needs: [changes, go-build]
    if: needs.changes.outputs.docker-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-web:
    name: Docker / Web image
    needs: [changes, frontend-build]
    if: needs.changes.outputs.docker-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
