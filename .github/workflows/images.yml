name: images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: docker/Dockerfile
            target: api
            title: ocidex-api
            description: OCIDex API server (HTTP, OAuth, search, ingestion)
          - name: scanner-worker
            dockerfile: docker/Dockerfile
            target: scanner-worker
            title: ocidex-scanner-worker
            description: OCIDex scanner worker (OCI registry walk and SBOM extraction via syft)
          - name: enrichment-worker
            dockerfile: docker/Dockerfile
            target: enrichment-worker
            title: ocidex-enrichment-worker
            description: OCIDex enrichment worker (SBOM post-processing pipeline)
          - name: web
            dockerfile: docker/web/Dockerfile
            target: ""
            title: ocidex-web
            description: OCIDex SolidJS frontend served by nginx
          - name: operator
            dockerfile: docker/Dockerfile
            target: operator
            title: ocidex-operator
            description: OCIDex K8s operator for OCIRegistry, ScanRequest, and APIKey CRDs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: vars
        run: |
          {
            echo "version=main-$(echo ${GITHUB_SHA} | cut -c1-7)"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ocidex-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=pfenerty
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          annotations: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=pfenerty
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.vars.outputs.date }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  publish-charts:
    name: publish Helm charts
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push ocidex chart
        run: |
          helm package charts/ocidex \
            --version "0.0.0-${{ github.sha }}" \
            --app-version "sha-${{ steps.sha.outputs.short }}"
          helm push ocidex-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Package and push ocidex-operator chart
        run: |
          helm package charts/ocidex-operator \
            --version "0.0.0-${{ github.sha }}" \
            --app-version "sha-${{ steps.sha.outputs.short }}"
          helm push ocidex-operator-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

