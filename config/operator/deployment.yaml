apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocidex-operator
  namespace: ocidex-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocidex-operator
  template:
    metadata:
      labels:
        app: ocidex-operator
    spec:
      serviceAccountName: ocidex-operator
      terminationGracePeriodSeconds: 35
      containers:
        - name: operator
          image: ocidex-operator:latest
          imagePullPolicy: Always
          args:
            - --leader-elect=true
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          env:
            - name: OCIDEX_SERVER
              valueFrom:
                secretKeyRef:
                  name: ocidex-operator-secrets
                  key: OCIDEX_SERVER
            - name: OCIDEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ocidex-operator-secrets
                  key: OCIDEX_API_KEY
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
