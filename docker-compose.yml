services:
  postgres:
    image: docker.io/postgres:15.4-alpine
    container_name: ocidex-postgres
    restart: always
    environment:
      POSTGRES_USER: ocidex
      POSTGRES_PASSWORD: ocidex
      POSTGRES_DB: ocidex
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocidex"]
      interval: 5s
      timeout: 3s
      retries: 5

  ocidex:
    build: .
    container_name: ocidex-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      PORT: "8080"
      LOG_LEVEL: info
      ENVIRONMENT: development
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      ENRICHMENT_ENABLED: "true"
      ENRICHMENT_WORKERS: "2"
      ENRICHMENT_QUEUE_SIZE: "100"
    ports:
      - "8080:8080"

  web:
    build: ./web
    container_name: ocidex-web
    restart: unless-stopped
    depends_on:
      - ocidex
    ports:
      - "3000:3000"

volumes:
  db-data:
