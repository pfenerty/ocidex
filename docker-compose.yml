services:
  postgres:
    image: docker.io/postgres:15.18-alpine
    container_name: ocidex-postgres
    restart: always
    environment:
      POSTGRES_USER: ocidex
      POSTGRES_PASSWORD: ocidex
      POSTGRES_DB: ocidex
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocidex"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: docker.io/nats:2-alpine
    container_name: ocidex-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--store_dir", "/data"]
    ports:
      - "4222:4222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    container_name: ocidex-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
    command: ["migrate", "up"]

  ocidex:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    container_name: ocidex-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Distributed topology: scanner-worker + per-enricher workers consume from NATS.
      # FRONTEND_URL, CORS_ALLOWED_ORIGINS, GITHUB_REDIRECT_URL come from .env so
      # tailnet/remote hostnames work without compose edits.
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      NATS_URL: nats://nats:4222
      PORT: "8080"
      LOG_LEVEL: info
      ENVIRONMENT: development
    env_file:
      - .env
    ports:
      - "8080:8080"

  scanner-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: scanner-worker
    container_name: ocidex-scanner-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      ENVIRONMENT: development

  # Per-enricher microservices (ADR-033). Each worker claims only its own
  # enricher_name partition from enrichment_jobs and runs a single enricher.
  # Together they replace the monolithic enrichment-worker (enricher_name="all").
  # Resolvers (insecure-host, credentials, trust) are DB-backed, so no extra env.
  oci-metadata-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: oci-metadata-worker
    container_name: ocidex-oci-metadata-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      ENVIRONMENT: development

  git-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: git-worker
    container_name: ocidex-git-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      ENVIRONMENT: development

  user-enricher-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: user-enricher-worker
    container_name: ocidex-user-enricher-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      ENVIRONMENT: development

  provenance-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: provenance-worker
    container_name: ocidex-provenance-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      ENVIRONMENT: development

  # Vulnerability worker: refreshes the package-keyed OSV vulnerability store on a
  # schedule (no NATS). Talks to Postgres and api.osv.dev. Singleton via a Postgres
  # advisory lock, so scaling to >1 is safe. A short refresh interval is set here so
  # newly ingested SBOMs light up quickly during local exploration.
  vuln-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: vuln-worker
    container_name: ocidex-vuln-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ocidex:ocidex@postgres:5432/ocidex?sslmode=disable
      LOG_LEVEL: info
      ENVIRONMENT: development
      VULN_REFRESH_ENABLED: "true"
      VULN_REFRESH_INTERVAL: "10m"

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: ocidex-web
    restart: unless-stopped
    depends_on:
      - ocidex
    environment:
      BACKEND_URL: http://ocidex:8080
    ports:
      - "3000:80"

volumes:
  db-data:
  nats-data:
  zot-data:
