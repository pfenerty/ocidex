# OCIDex operator Helm values.
# Required: server.url must be set to the OCIDex API server URL.

image:
  repository: ghcr.io/pfenerty/ocidex-operator
  # tag defaults to Chart.appVersion (set to sha-<short> or vX.Y.Z at package time).
  # Override with --set image.tag=<tag> to pin a specific version.
  tag: ""
  pullPolicy: IfNotPresent

# server.url is the base URL of the OCIDex API server (OCIDEX_SERVER).
# Example: "http://ocidex-api.ocidex.svc.cluster.local:8080"
server:
  url: ""

# apiKey configures where the operator reads its OCIDex API key (OCIDEX_API_KEY).
apiKey:
  secretName: ocidex-operator-secrets
  secretKey: OCIDEX_API_KEY

# watchNamespace restricts the operator to reconciling CRs in a single namespace.
# Required — prevents multiple operator instances from stepping on each other.
watchNamespace: ""

# leaderElect enables leader election for multi-replica deployments.
leaderElect: true

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"
