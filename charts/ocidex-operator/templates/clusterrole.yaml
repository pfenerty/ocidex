apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ocidex-operator.fullname" . }}
  labels:
    {{- include "ocidex-operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [secrets]
  verbs: [create, delete, get, patch, update]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [ocidex.io]
  resources: [apikeys, ociregistries, scanrequests]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [ocidex.io]
  resources: [apikeys/status, ociregistries/status, scanrequests/status]
  verbs: [get, patch, update]
