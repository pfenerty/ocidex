apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ocidex.fullname" . }}-enrichment-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ocidex.labels" . | nindent 4 }}
    app.kubernetes.io/component: enrichment-worker
spec:
  {{- if not .Values.keda.enabled }}
  replicas: {{ .Values.enrichmentWorker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ocidex.selectorLabels" (dict "root" . "component" "enrichment-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ocidex.podLabels" (dict "root" . "component" "enrichment-worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ocidex.fullname" . }}
      terminationGracePeriodSeconds: 360
      containers:
        - name: enrichment-worker
          image: {{ include "ocidex.image" (dict "root" . "name" "enrichment-worker") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: 9090
          resources:
            {{- toYaml .Values.enrichmentWorker.resources | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            - name: NATS_URL
              value: "nats://{{ include "ocidex.fullname" . }}-nats:4222"
            - name: NATS_STREAM_REPLICAS
              value: {{ .Values.enrichmentWorker.env.natsStreamReplicas | quote }}
            - name: DATABASE_MAX_CONNECTIONS
              value: {{ .Values.enrichmentWorker.env.databaseMaxConnections | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.enrichmentWorker.env.environment | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.enrichmentWorker.env.logLevel | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
