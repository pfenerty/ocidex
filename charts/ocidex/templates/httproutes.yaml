{{- if .Values.gatewayApi.enabled }}
{{- if not .Values.gatewayApi.gatewayName }}
{{- fail "gatewayApi.gatewayName is required when gatewayApi.enabled=true" }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ocidex.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ocidex.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayApi.gatewayName }}
      {{- if .Values.gatewayApi.gatewayNamespace }}
      namespace: {{ .Values.gatewayApi.gatewayNamespace }}
      {{- end }}
  hostnames:
    - {{ .Values.gatewayApi.apiHostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "ocidex.fullname" . }}-api
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ocidex.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ocidex.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayApi.gatewayName }}
      {{- if .Values.gatewayApi.gatewayNamespace }}
      namespace: {{ .Values.gatewayApi.gatewayNamespace }}
      {{- end }}
  hostnames:
    - {{ .Values.gatewayApi.webHostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "ocidex.fullname" . }}-web
          port: 80
{{- end }}
