apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ocidex.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ocidex.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "ocidex.selectorLabels" (dict "root" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ocidex.selectorLabels" (dict "root" . "component" "web") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ocidex.fullname" . }}
      containers:
        - name: web
          image: {{ include "ocidex.image" (dict "root" . "name" "web") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
