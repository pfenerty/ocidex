apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ocidex.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ocidex.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "ocidex.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ocidex.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ocidex.fullname" . }}
      terminationGracePeriodSeconds: 40
      containers:
        - name: api
          image: {{ include "ocidex.image" (dict "root" . "name" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            - name: PORT
              value: "8080"
            - name: NATS_URL
              value: "nats://{{ include "ocidex.fullname" . }}-nats:4222"
            - name: NATS_STREAM_REPLICAS
              value: {{ .Values.api.env.natsStreamReplicas | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.api.env.environment | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.api.env.logLevel | quote }}
            {{- if .Values.api.env.frontendUrl }}
            - name: FRONTEND_URL
              value: {{ .Values.api.env.frontendUrl | quote }}
            {{- end }}
            {{- if .Values.api.env.corsAllowedOrigins }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.api.env.corsAllowedOrigins | quote }}
            {{- end }}
            {{- if .Values.api.env.apiBaseUrl }}
            - name: API_BASE_URL
              value: {{ .Values.api.env.apiBaseUrl | quote }}
            {{- end }}
            {{- if .Values.api.env.githubRedirectUrl }}
            - name: GITHUB_REDIRECT_URL
              value: {{ .Values.api.env.githubRedirectUrl | quote }}
            {{- end }}
            - name: SCANNER_ENABLED
              value: {{ .Values.api.env.scannerEnabled | quote }}
            - name: REGISTRY_POLLER_ENABLED
              value: {{ .Values.api.env.registryPollerEnabled | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
